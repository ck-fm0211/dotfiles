git:
  # need `export $XDG_CONFIG_HOME=$HOME/.config`
  -
    src: .config/git/config
    dst: .config/git/config
  -
    src: .config/git/ignore
    dst: .config/git/ignore
  -
    src: .config/git/hooks
    dst: .config/git/hooks

homebrew:
  -
    src: .config/homebrew/Brewfile
    dst: .config/homebrew/Brewfile
  -
    src: .config/homebrew/Brewfile.cask
    dst: .config/homebrew/Brewfile.cask
  -
    src: .config/homebrew/Brewfile.mas
    dst: .config/homebrew/Brewfile.mas
  -
    src: .config/homebrew/Brewfile.taps
    dst: .config/homebrew/Brewfile.taps
  -
    src: .config/homebrew/Brewfile.vscode
    dst: .config/homebrew/Brewfile.vscode

sheldon:
  src: .config/sheldon/plugins.toml
  dst: .config/sheldon/plugins.toml

mise:
  src: .config/mise/config.toml
  dst: .config/mise/config.toml

zsh:
  -
    src: .config/zsh/.zshenv
    dst: .config/zsh/.zshenv
  -
    src: .config/zsh/.zshrc
    dst: .config/zsh/.zshrc
  -
    src: .config/zsh/path.zsh
    dst: .config/zsh/path.zsh
  -
    src: .config/zsh/completion.zsh
    dst: .config/zsh/completion.zsh
  -
    src: .config/zsh/bindkey.zsh
    dst: .config/zsh/bindkey.zsh
  -
    src: .config/zsh/settings.zsh
    dst: .config/zsh/settings.zsh
  -
    src: .config/zsh/alias.zsh
    dst: .config/zsh/alias.zsh
  -
    src: .config/zsh/functions.zsh
    dst: .config/zsh/functions.zsh
  -
    src: .config/zsh/.p10k.zsh
    dst: .config/zsh/.p10k.zsh

iterm2:
  src: .config/iterm2/com.googlecode.iterm2.plist
  dst: .config/iterm2/com.googlecode.iterm2.plist

vscode:
  -
    src: .config/vscode/settings.json
    dst: "Library/Application Support/Code/User/settings.json"
  -
    src: .config/vscode/keybindings.json
    dst: "Library/Application Support/Code/User/keybindings.json"

python:
  src: .config/python/pythonrc
  dst: python/pythonrc

custom_scripts:
  src: .local/bin/scripts
  dst: .local/bin/scripts

bat:
  src: .config/bat/config
  dst: .config/bat/config

ripgrep:
  src: .config/ripgrep/config
  dst: .config/ripgrep/config

claude_code:
  -
    src: .config/claude/settings.json
    dst: .config/claude/settings.json
  -
    src: .config/claude/CLAUDE.md
    dst: .config/claude/CLAUDE.md
  -
    src: .config/claude/agents/code-reviewer.md
    dst: .config/claude/agents/code-reviewer.md
  -
    src: .config/claude/mcp-servers.json
    dst: .config/claude/mcp-servers.json
  -
    src: .config/claude/keybindings.json
    dst: .config/claude/keybindings.json
