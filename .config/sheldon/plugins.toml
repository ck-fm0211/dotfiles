# `sheldon` configuration file
# ----------------------------
#
# You can modify this file directly or you can use one of the following
# `sheldon` commands which are provided to assist in editing the config file:
#
# - `sheldon add` to add a new plugin to the config file
# - `sheldon edit` to open up the config file in the default editor
# - `sheldon remove` to remove a plugin from the config file
#
# See the documentation for more https://github.com/rossmacarthur/sheldon#readme

shell = "zsh"

[plugins]

[plugins.zsh-defer]
github = "romkatv/zsh-defer"

[templates]
defer = "{% for file in files %}zsh-defer source \"{{ file }}\"\n{% endfor %}"

[plugins.compinit]
inline = 'autoload -Uz compinit && zsh-defer compinit'

# ローカル設定ファイル群
[plugins.path]
local = "~/.config/zsh"
use = ["path.zsh"]

[plugins.settings]
local = "~/.config/zsh"
use = ["settings.zsh"]

[plugins.completion]
local = "~/.config/zsh"
use = ["completion.zsh"]
apply = ['defer']

[plugins.functions]
local = "~/.config/zsh"
use = ["functions.zsh"]
apply = ['defer']

[plugins.alias]
local = "~/.config/zsh"
use = ["alias.zsh"]
apply = ['defer']

[plugins.bindkey]
local = "~/.config/zsh"
use = ["bindkey.zsh"]
apply = ['defer']

[plugins.colors]
inline = 'autoload -Uz colors && zsh-defer colors'

# GitHub プラグイン
[plugins.zsh-autosuggestions]
github = 'zsh-users/zsh-autosuggestions'
apply = ['defer']

[plugins.zsh-completions]
github = 'zsh-users/zsh-completions'
apply = ['defer']

[plugins.zsh-syntax-highlighting]
github = 'zsh-users/zsh-syntax-highlighting'
apply = ['defer']

[plugins.autopair]
github = "hlissner/zsh-autopair"
apply = ['defer']

[plugins.kubectl-completion]
# `git ls-remote https://github.com/nnao45/zsh-kubectl-completion HEAD` で更新確認する。
# この環境では GitHub への名前解決ができないため、`master` 追従はやめて取得できた最新公開タグで固定する。
remote = "https://raw.githubusercontent.com/nnao45/zsh-kubectl-completion/v0.1.12/_kubectl"
apply = ["defer"]

[plugins.powerlevel10k]
github = "romkatv/powerlevel10k"

# Apple Silicon / Intel 両対応
# /opt/homebrew (Apple Silicon) または /usr/local (Intel) を自動判定
# .zshrc で先行評価済みの場合は重複実行をスキップ
[plugins.homebrew]
inline = '''
if ! command -v brew >/dev/null 2>&1; then
  if [[ -x /opt/homebrew/bin/brew ]]; then
    eval "$(/opt/homebrew/bin/brew shellenv)"
  elif [[ -x /usr/local/bin/brew ]]; then
    eval "$(/usr/local/bin/brew shellenv)"
  fi
fi
'''

[plugins.mise]
inline = 'command -v mise >/dev/null 2>&1 && eval "$(mise activate zsh 2>/dev/null)"'

[plugins.anyframe]
github = 'mollifier/anyframe'
apply = ['defer']
