name: macOS CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# 同一ブランチで複数 push がある場合、古いジョブをキャンセル
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ============================================================
  # shellcheck: スクリプトの静的解析（軽量なので単独ジョブ）
  # ============================================================
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run shellcheck
        run: make shellcheck

  # ============================================================
  # macOS セットアップテスト
  # ============================================================
  macos-test:
    name: macOS Setup Test
    runs-on: macos-latest
    # shellcheck と並列実行（独立しているため依存不要）

    steps:
      - uses: actions/checkout@v4

      # Brewfile.cask / Brewfile.vscode の変更検出（PR 時のみ有効）
      - name: Detect changed Brewfiles
        id: brewfile-changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            cask:
              - '.config/homebrew/Brewfile.cask'
            vscode:
              - '.config/homebrew/Brewfile.vscode'

      # Homebrew のダウンロードキャッシュのみ保持（Cellar はランナーとの競合を避けるため除外）
      - name: Cache Homebrew downloads
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: ${{ runner.os }}-brew-${{ hashFiles('.config/homebrew/Brewfile', '.config/homebrew/Brewfile.taps') }}
          restore-keys: |
            ${{ runner.os }}-brew-

      - name: Install (Homebrew + XDG + yq)
        run: make install

      # ランナーのプリインストール済みパッケージと brew bundle の競合を防ぐ
      - name: Cleanup stale Homebrew state
        run: brew cleanup --prune=all 2>/dev/null || true

      - name: Create symlinks
        run: make link

      - name: Install Homebrew CLI packages
        run: |
          make brew-bundle-taps
          make brew-bundle
          # make brew-bundle-mas  # Mac App Store は認証が必要なためスキップ

      # push（main マージ）または Brewfile.cask 変更 PR のみ実行
      - name: Install Homebrew cask packages
        if: github.event_name == 'push' || steps.brewfile-changes.outputs.cask == 'true'
        run: make brew-bundle-cask

      # push（main マージ）または Brewfile.vscode 変更 PR のみ実行
      - name: Install VSCode extensions
        if: github.event_name == 'push' || steps.brewfile-changes.outputs.vscode == 'true'
        run: make brew-bundle-vscode

      - name: Initialize sheldon
        run: make sheldon

      - name: Install mise-managed tools (node, python, go, terraform)
        run: make mise-install

      - name: Apply macOS defaults
        run: make mac-defaults

      - name: Install AWS CLI
        run: make install-awscli

      - name: Install Google Cloud SDK
        run: |
          make install-gcloud
          echo "$HOME/google-cloud-sdk/bin" >> "$GITHUB_PATH"

      - name: Install Claude Code
        run: |
          make install-claude-code
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      # mcp-setup は CI 対象外: claude コマンドの認証状態とローカル設定ファイル
      # ($XDG_CONFIG_HOME/claude/mcp-servers.json) に依存するため自動テストが困難

      - name: Configure Git for CI
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git config --global init.defaultBranch main

      - name: Configure Git hooks
        run: make git-hooks

      - name: Run doctor (environment health check)
        run: make doctor
        # doctor.sh は WARN(exit 0) と FAIL(exit 1) を区別する。WARN は CI を継続し、FAIL だけ落とす

      - name: Run shellcheck (zsh configs)
        run: make shellcheck
