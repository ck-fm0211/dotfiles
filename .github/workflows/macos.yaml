name: macOS CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# 同一ブランチで複数 push がある場合、古いジョブをキャンセル
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ============================================================
  # shellcheck: スクリプトの静的解析（軽量なので単独ジョブ）
  # ============================================================
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run shellcheck
        run: |
          find scripts/ -name "*.sh" -print0 \
            | xargs -0 shellcheck -e SC1091 --severity=warning

  # ============================================================
  # macOS セットアップテスト
  # ============================================================
  macos-test:
    name: macOS Setup Test
    runs-on: macos-latest
    needs: shellcheck

    steps:
      - uses: actions/checkout@v4

      # Homebrew のキャッシュ
      - name: Cache Homebrew
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /opt/homebrew/Cellar
          key: ${{ runner.os }}-brew-${{ hashFiles('.config/homebrew/Brewfile', '.config/homebrew/Brewfile.cask', '.config/homebrew/Brewfile.taps') }}
          restore-keys: |
            ${{ runner.os }}-brew-

      - name: Install (Homebrew + XDG + yq)
        run: make install

      - name: Create symlinks
        run: make link

      - name: Install Homebrew packages
        run: |
          make brew-bundle-taps
          make brew-bundle
          make brew-bundle-cask
          make brew-bundle-vscode
          # make brew-bundle-mas  # Mac App Store は認証が必要なためスキップ

      - name: Initialize sheldon
        run: make sheldon

      - name: Apply macOS defaults
        run: make mac-defaults

      - name: Install AWS CLI
        run: make install-awscli

      - name: Install Google Cloud SDK
        run: |
          make install-gcloud
          echo "$HOME/google-cloud-sdk/bin" >> "$GITHUB_PATH"

      - name: Install Claude Code
        run: |
          make install-claude-code
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Configure Git for CI
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git config --global init.defaultBranch main

      - name: Configure Git hooks
        run: make git-hooks

      - name: Run doctor (environment health check)
        run: make doctor || true  # 警告があっても CI は継続

      - name: Run shellcheck (zsh configs)
        run: make shellcheck
