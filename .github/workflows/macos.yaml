name: macos

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  macos-test:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Run install.sh
      run: make install

    - name: Run link.sh
      run: make link

    - name: Run brew (taps → brews → casks → vscode)
      run: |
        make brew-bundle-taps
        make brew-bundle
        make brew-bundle-cask
        make brew-bundle-vscode
        # make brew-bundle-mas # Mac App Store は認証が必要なためスキップ

    - name: Run sheldon.sh
      run: make sheldon

    - name: Run mac_defaults.sh
      run: make mac-defaults

    - name: Install AWS CLI
      run: make install-awscli

    - name: Install Google Cloud SDK
      run: make install-gcloud

    - name: Install Claude Code
      run: make install-claude-code

    - name: Run shellcheck
      run: make shellcheck
